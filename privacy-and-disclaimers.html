    var p = document.body || document.documentElement;

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than

    const headOpen = template.match(/<head[^>]*>/i);

      template = template.slice(0, i) + resourceScript + template.slice(i);

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);

      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

div class=\"page-hero-meta-row\"><span class=\"lbl\">Prepared<\u002Fspan><span class=\"val\">May 2026<\u002Fspan><\u002Fdiv>\n      <div class=\"page-hero-meta-row\"><span class=\"lbl\">Source basis<\u002Fspan><span class=\"val\">Publicly available only<\u002Fspan><\u002Fdiv>\n      <div class=\"page-hero-meta-row\"><span class=\"lbl\">Lens<\u002Fspan><span class=\"val\">Industry / sector level<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"toc\">\n  <div class=\"toc-wrap\">\n    <div class=\"toc-label\">On this page<\u002Fdiv>\n    <div class=\"toc-list\">\n      <a href=\"#purpose\">1 · Purpose<\u002Fa>\n      <a href=\"#scope\">2 · Scope &amp; limitations<\u002Fa>\n      <a href=\"#enforcement\">3 · No enforcement implication<\u002Fa>\n      <a href=\"#reliance\">4 · Reliance &amp; responsibility<\u002Fa>\n      <a href=\"#warranty\">5 · No warranty<\u002Fa>\n      <a href=\"#third-party\">6 · Third-party sources<\u002Fa>\n      <a href=\"#disclosure\">7 · Responsible disclosure<\u002Fa>\n      <a href=\"#awareness\">8 · Awareness purpose<\u002Fa>\n      <a href=\"#privacy\">9 · Privacy<\u002Fa>\n      <a href=\"#legal\">A · Legal risk considerations<\u002Fa>\n      <a href=\"#reprised\">B · Notices reprised<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<main>\n<div class=\"legal-wrap\">\n\n  <section class=\"legal-section\">\n    <h2><span class=\"ix\">Overview<\u002Fspan><\u002Fh2>\n    <p class=\"lede\">This report is provided for general informational and educational purposes only. By reading this report, the reader acknowledges and agrees to the notices set out below.<\u002Fp>\n  <\u002Fsection>\n\n  <section class=\"legal-section\" id=\"purpose\">\n    <h2><span class=\"ix\">01<\u002Fspan> Purpose &amp; General Use Statement<\u002Fh2>\n    <p>This document is intended to support public-interest analysis and policy discussion concerning systemic cybersecurity vulnerability conditions within the US telecommunications sector, based on the synthesis of publicly available information.<\u002Fp>\n    <p>The report is designed to support regulatory awareness, program design, and sector-level resilience discussions — including those associated with broadband deployment, infrastructure funding, and operational-sustainability initiatives.<\u002Fp>\n  <\u002Fsection>\n\n  <section class=\"legal-section\" id=\"scope\">\n    <h2><span class=\"ix\">02<\u002Fspan> Report Scope &amp; Limitations<\u002Fh2>\n    <p>The analyses and observations contained herein:<\u002Fp>\n    <ul>\n      <li>Were derived <strong>exclusively from open-source, publicly disclosed<\u002Fstrong> vulnerabilities, cybersecurity advisories, incident reports, domain registry records, public company filings, openly published industry reports and other openly accessible reference material.<\u002Fli>\n      <li>Reflect <strong>aggregate and sector-level data insights<\u002Fstrong>, and not evaluations of individual telecommunications providers or networks.<\u002Fli>\n      <li>Do not constitute explicit findings, determinations, compliance judgments, or lack of enforcement conclusions under any statute, rule, or program, including but not limited to FCC regulations or the BEAD Program requirements.<\u002Fli>\n    <\u002Ful>\n\n    <h3><span class=\"ix\">2.1<\u002Fspan> Not a vulnerability assessment, audit or compliance evaluation<\u002Fh3>\n    <p>This report does not constitute, and should not be construed as, a vulnerability assessment, penetration test, security audit, compliance evaluation, threat assessment, incident-response engagement or definitive evaluation of cybersecurity risk for the telecommunications sector or for any individual provider. It reflects a high-level analysis of publicly available information and is not a definitive indicator of risk, exploitability, compliance status, or operational practice.<\u002Fp>\n\n    <h3><span class=\"ix\">2.2<\u002Fspan> Non-intrusive source basis<\u002Fh3>\n    <p>All information referenced in this report was derived exclusively from publicly accessible, non-intrusive sources. <strong>No authenticated scans were attempted<\u002Fstrong> against any system, <strong>no access controls were circumvented<\u002Fstrong>, <strong>no proprietary or non-public data was accessed<\u002Fstrong>, and no system performance, availability or confidentiality was impacted in connection with the preparation of this report. No representation is made as to the completeness, accuracy, or contemporaneity of third-party disclosures, which may evolve over time and vary in depth or reliability.<\u002Fp>\n  <\u002Fsection>\n\n  <section class=\"legal-section\" id=\"enforcement\">\n    <h2><span class=\"ix\">03<\u002Fspan> No Enforcement, Compliance or Eligibility Implication<\u002Fh2>\n    <p>Nothing in this document should be interpreted as:<\u002Fp>\n    <ul>\n      <li>An allegation of <strong>non-compliance, negligence or misconduct<\u002Fstrong> by any US telecommunications provider;<\u002Fli>\n      <li>A basis for <strong>enforcement, adjudication, or funding eligibility<\u002Fstrong> determination;<\u002Fli>\n      <li>A <strong>substitute for formal regulatory review<\u002Fstrong>, audit, or provider self-certification.<\u002Fli>\n    <\u002Ful>\n\n    <div class=\"callout\">\n      <div class=\"callout-label\">No assertions about specific providers<\u002Fdiv>\n      <p>Nothing in this report should be read as an assertion of fact about, an evaluation of, or a judgment regarding any individual telecommunications provider, named or unnamed. Where examples or aggregate counts are given, they are intended solely to convey industry-level patterns. Any inference drawn about a specific provider, named or unnamed, is made by the reader at the reader’s own risk.<\u002Fp>\n    <\u002Fdiv>\n\n    <p>References to technologies, operational environments, or risk categories are contextual and illustrative only and do not imply regulatory interpretation or policy position.<\u002Fp>\n  <\u002Fsection>\n\n  <section class=\"legal-section\" id=\"reliance\">\n    <h2><span class=\"ix\">04<\u002Fspan> Reliance &amp; Responsibility<\u002Fh2>\n    <p>This document does not provide or constitute legal, regulatory, technical, or operational advice. Agencies, eligible entities, and stakeholders should rely on their own internal security processes, expertise, and statutory authorities when making programmatic or regulatory decisions.<\u002Fp>\n  <\u002Fsection>\n\n  <section class=\"legal-section\" id=\"warranty\">\n    <h2><span class=\"ix\">05<\u002Fspan> No Warranty; Limitation of Liability<\u002Fh2>\n    <p>The authors and publishers of this report make no representations or warranties, express or implied, regarding the accuracy, completeness, timeliness, fitness for any particular purpose or reliability of the information presented. All content is provided strictly on an <strong>“as-is”<\u002Fstrong> basis.<\u002Fp>\n    <p>The authors and publishers expressly disclaim, to the maximum extent permitted by law, any and all liability arising out of or in connection with any use of, reliance on, or actions taken or not taken on the basis of the contents of this report.<\u002Fp>\n  <\u002Fsection>\n\n  <section class=\"legal-section\" id=\"third-party\">\n    <h2><span class=\"ix\">06<\u002Fspan> Third-Party Sources, References &amp; Trademarks<\u002Fh2>\n    <p>This report references industry studies, sector statistics, advisories, and threat-landscape findings published by third-party organizations. Such references are made for context and to support readability. The authors of this report make no representation as to the accuracy, completeness or current validity of third-party information; readers should consult the original sources directly.<\u002Fp>\n    <p>References in this report to any tool, platform, vendor or technology are descriptive only and do not constitute or imply endorsement, affiliation, sponsorship or approval. <strong>All trademarks, service marks, and product names are the property of their respective owners.<\u002Fstrong><\u002Fp>\n  <\u002Fsection>\n\n  <section class=\"legal-section\" id=\"disclosure\">\n    <h2><span class=\"ix\">07<\u002Fspan> Responsible Disclosure &amp; Information Sensitivity<\u002Fh2>\n    <p>Sensitive technical detail that could reasonably enable malicious activity has been intentionally omitted, summarized or generalized throughout this report. The authors adhere to widely-recognized responsible-disclosure principles consistent with research touching on critical-infrastructure sectors, and do not publish information that could foreseeably facilitate unauthorized access to, exploitation of, or operational disruption of any provider’s systems.<\u002Fp>\n    <p>The principles applied during preparation are aligned with the spirit of CISA’s Coordinated Vulnerability Disclosure framework and with sector-specific expectations for safeguarding critical-infrastructure information.<\u002Fp>\n    <p>Specifically:<\u002Fp>\n    <ul>\n      <li>No exploitation paths, attack instructions, or specific configuration detail are published.<\u002Fli>\n      <li>All findings are aggregated and presented at the industry level. No individual provider is named, characterized, or evaluated.<\u002Fli>\n      <li>Where indicators are referenced (CVEs cataloged by CISA as actively exploited, weak email authentication posture, etc.), references are limited to publicly documented industry concepts already widely discussed in cybersecurity research, federal advisories, and vendor publications. The report does not introduce new vulnerability information into the public domain.<\u002Fli>\n    <\u002Ful>\n  <\u002Fsection>\n\n  <section class=\"legal-section\" id=\"awareness\">\n    <h2><span class=\"ix\">08<\u002Fspan> Awareness Purpose; No Adverse Use<\u002Fh2>\n    <p>This report is intended to support industry awareness, board-level discussion, regulatory engagement, academic interest, and public-interest discourse regarding the cybersecurity posture of the US telecommunications sector.<\u002Fp>\n    <p>It is <strong>not intended for, and should not be used for<\u002Fstrong>, competitive intelligence, targeting, or any purpose adverse to the interests of any provider.<\u002Fp>\n  <\u002Fsection>\n\n  <section class=\"legal-section\" id=\"privacy\">\n    <h2><span class=\"ix\">09<\u002Fspan> Privacy<\u002Fh2>\n    <p>This site collects only the information you voluntarily submit (for example, when requesting a copy of the report or an operator-level indicator review). Submitted details are used to verify your authorisation to receive gated material and to respond to your request.<\u002Fp>\n    <p>We do not sell or share submitted information with third parties for marketing purposes. Output produced through operator-level engagements is released only to verified representatives of the operator concerned, consistent with the responsible-disclosure principles set out above.<\u002Fp>\n    <p>The lookup feature on the home page evaluates a domain you supply against publicly available indicators and returns an aggregate band classification. Detailed per-subdomain output is gated behind verification.<\u002Fp>\n  <\u002Fsection>\n\n  <section class=\"legal-section\" id=\"legal\">\n    <h2><span class=\"ix\">Appendix A<\u002Fspan> Legal Risk Considerations<\u002Fh2>\n    <p class=\"lede\">This appendix summarizes the categories of legal risk the authors took into account in preparing this report, together with the corresponding controls applied. It is provided for transparency. Nothing in this appendix constitutes legal advice; readers requiring such advice should consult qualified counsel.<\u002Fp>\n\n    <h3><span class=\"ix\">A.1<\u002Fspan> Computer Fraud &amp; Abuse Act<\u002Fh3>\n    <p>Federal courts have at times interpreted the Computer Fraud and Abuse Act broadly, including in contexts involving analysis of publicly accessible information about computer systems. To remain well within accepted boundaries, the analysis underlying this report was conducted on a strictly <strong>non-intrusive<\u002Fstrong> basis. No authentication was attempted against any system. No access controls were circumvented. No proprietary, internal or non-public data was accessed or attempted. No system performance, availability or confidentiality was impacted. The work relied exclusively on openly accessible information and on widely-used reference sources, used in a manner consistent with the published terms governing those sources.<\u002Fp>\n\n    <h3><span class=\"ix\">A.2<\u002Fspan> Digital Millennium Copyright Act §1201<\u002Fh3>\n    <p>Section 1201 of the Digital Millennium Copyright Act restricts circumvention of technological measures controlling access to copyrighted works. This report contains <strong>no exploit code, no bypass technique, and no actionable instruction<\u002Fstrong> that could be construed as enabling circumvention of any access control. References to widely-documented vulnerabilities, including CVEs in the CISA Known Exploited Vulnerabilities catalogue, are limited to identification by CVE number and to descriptions already in the public domain. Such references are presented exclusively at the industry-aggregate level.<\u002Fp>\n\n    <h3><span class=\"ix\">A.3<\u002Fspan> Defamation &amp; Reputational Harm<\u002Fh3>\n    <p>Sector-level cybersecurity reporting can give rise to reputational claims if specific operators are characterized in ways they consider inaccurate or harmful. To mitigate this risk, the report does not name any individual provider. All findings are aggregated and reported at the industry level. The report has been drafted to describe observable industry-level conditions — using terms such as “present,” “analysed,” “publicly visible,” and “elevated risk band” — rather than to assert fault or negligence with respect to any operator.<\u002Fp>\n\n    <h3><span class=\"ix\">A.4<\u002Fspan> Critical-Infrastructure Sensitivity<\u002Fh3>\n    <p>Telecommunications is a designated critical-infrastructure sector under the US Department of Homeland Security sector classification. To respect the sensitivity associated with that designation, sensitive technical detail has been intentionally generalised throughout this report. No IP address, asset-specific identifier, or operator-specific configuration appears in the report, and no exploitation pathway is described. The focus of the report is on aggregate sector posture relevant to policy, board-level and resilience discussion.<\u002Fp>\n\n    <h3><span class=\"ix\">A.5<\u002Fspan> Tool &amp; Source Terms of Use<\u002Fh3>\n    <p>The analysis underlying this report relied on openly accessible information accessed in a manner consistent with the published terms governing the relevant sources. Where automated retrieval was used, it was operated within the parameters those sources permit. Where reference tools or libraries were used, they were used in accordance with their respective licensing terms.<\u002Fp>\n\n    <h3><span class=\"ix\">A.6<\u002Fspan> Regulatory &amp; Methodological Framework Alignment<\u002Fh3>\n    <p>The approach taken in preparing this report is consistent in spirit with established frameworks for non-intrusive cybersecurity research, including the passive-assessment principles articulated in <strong>NIST Special Publication 800-115<\u002Fstrong>, the external attack-surface management principles reflected in <strong>CISA Binding Operational Directive 23-02<\u002Fstrong>, the best-practice guidance issued by the <strong>FCC Communications Security, Reliability, and Interoperability Council<\u002Fstrong>, and DHS guidelines for security research touching on critical-infrastructure sectors. References to such frameworks are made for context only and do not imply endorsement, accreditation, certification or approval by any of the referenced bodies.<\u002Fp>\n  <\u002Fsection>\n\n  <section class=\"legal-section\" id=\"reprised\">\n    <h2><span class=\"ix\">Appendix B<\u002Fspan> Important Notices Reprised<\u002Fh2>\n    <ul>\n      <li>All findings are derived from publicly available information and presented <strong>at the industry level<\u002Fstrong>.<\u002Fli>\n      <li>The report does not name, characterize, evaluate or assess any individual provider.<\u002Fli>\n      <li>Findings reflect a <strong>point-in-time view<\u002Fstrong> as of the preparation window and should not be relied upon as current at any later date.<\u002Fli>\n      <li>This report does not constitute legal, financial, security, regulatory or investment advice.<\u002Fli>\n      <li>References to third-party industry research are made for context; readers should consult original sources directly.<\u002Fli>\n    <\u002Ful>\n  <\u002Fsection>\n\n  <div class=\"acknowledge\">\n    <div class=\"acknowledge-ix\">Reader acknowledgment<\u002Fdiv>\n    <p>By reading, relying on, citing or distributing this report and the supporting materials on this site, the reader acknowledges that they have <strong>read, understood and accepted these notices in full<\u002Fstrong>. If the reader does not agree, the reader should not rely on, distribute, cite, or otherwise act on the contents of this report.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"contact-strip\">\n    <div>\n      <h3>Questions on these notices?<\u002Fh3>\n      <p>Contact the SureShield team for clarification on scope, licensing, or any of the items above.<\u002Fp>\n    <\u002Fdiv>\n    <a href=\"mailto:support@sureshield.ai\" class=\"btn\">→ support@sureshield.ai<\u002Fa>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fmain>\n\n<footer>\n  <div class=\"footer-brand\">\n    <img src=\"27103c74-eaa1-4ae3-af94-92c24a402615\" alt=\"SureShield\" class=\"logo-sureshield\">\n    <span class=\"logo-sep\"><\u002Fspan>\n    <img src=\"def74735-cb04-4cd9-9b96-b4cfdfc1fd8f\" alt=\"BorderHawk CyberSecurity\" class=\"logo-border
